name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: node scripts/legal-lint.mjs

      - run: pnpm build

      - name: Budget check (bundle < 30 kB gzip)
        run: |
          BUNDLE=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE" ]; then
            echo "No index bundle found, checking all JS assets..."
            BUNDLE=$(ls dist/assets/*.js 2>/dev/null | head -1)
          fi
          if [ -n "$BUNDLE" ]; then
            SIZE=$(gzip -c "$BUNDLE" | wc -c)
            echo "Bundle size: ${SIZE} bytes gzip"
            test "$SIZE" -lt 30720
          else
            echo "No JS bundle found in dist/assets — skipping size check"
          fi

      - name: Zero runtime dependencies
        run: |
          DEPS=$(node -p "Object.keys(JSON.parse(require('fs').readFileSync('package.json','utf8')).dependencies||{}).length")
          echo "Runtime deps: $DEPS"
          test "$DEPS" -eq 0
